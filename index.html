<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Runner - 3D Space Shooter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
  }

  #score-block { text-align: left; }
  #score-label { font-size: 11px; letter-spacing: 3px; opacity: 0.7; }
  #score { font-size: 36px; font-weight: bold; }

  #level-block { text-align: center; }
  #level-label { font-size: 11px; letter-spacing: 3px; opacity: 0.7; }
  #level { font-size: 36px; font-weight: bold; }

  #lives-block { text-align: right; }
  #lives-label { font-size: 11px; letter-spacing: 3px; opacity: 0.7; }
  #lives { font-size: 24px; letter-spacing: 4px; }

  #health-bar-wrap {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    pointer-events: none;
    z-index: 10;
  }
  #health-label {
    color: #00ffcc;
    font-size: 10px;
    letter-spacing: 3px;
    text-align: center;
    margin-bottom: 6px;
    text-shadow: 0 0 8px #00ffcc;
  }
  #health-bar-bg {
    background: rgba(0,255,204,0.15);
    border: 1px solid #00ffcc44;
    border-radius: 4px;
    height: 10px;
    width: 100%;
  }
  #health-bar {
    background: linear-gradient(90deg, #00ffcc, #00ff88);
    height: 100%;
    border-radius: 4px;
    width: 100%;
    box-shadow: 0 0 12px #00ffcc;
    transition: width 0.15s;
  }

  #crosshair {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 24px; height: 24px;
    pointer-events: none;
    z-index: 10;
  }
  #crosshair::before, #crosshair::after {
    content: '';
    position: absolute;
    background: rgba(0,255,204,0.8);
    box-shadow: 0 0 6px #00ffcc;
  }
  #crosshair::before { left: 50%; top: 0; width: 1px; height: 100%; transform: translateX(-50%); }
  #crosshair::after  { top: 50%; left: 0; height: 1px; width: 100%; transform: translateY(-50%); }

  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(0,20,40,0.95) 0%, rgba(0,0,0,0.98) 100%);
    z-index: 20;
    color: #fff;
    text-align: center;
  }
  #overlay h1 {
    font-size: 64px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #00ffcc;
    text-shadow: 0 0 30px #00ffcc, 0 0 60px #00ffcc44;
    margin-bottom: 8px;
  }
  #overlay .sub {
    font-size: 13px;
    letter-spacing: 5px;
    color: #4488aa;
    margin-bottom: 48px;
  }
  #overlay .instructions {
    font-size: 13px;
    line-height: 2;
    color: #aaccdd;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }
  #overlay .instructions span { color: #00ffcc; }
  #start-btn {
    padding: 16px 48px;
    font-size: 16px;
    letter-spacing: 4px;
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #00ffcc;
    border: 2px solid #00ffcc;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px #00ffcc44;
  }
  #start-btn:hover {
    background: #00ffcc22;
    box-shadow: 0 0 40px #00ffcc88;
    transform: scale(1.04);
  }
  #overlay.hidden { display: none; }

  #gameover-overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(40,0,0,0.95) 0%, rgba(0,0,0,0.98) 100%);
    z-index: 20;
    color: #fff;
    text-align: center;
  }
  #gameover-overlay h2 {
    font-size: 56px;
    font-weight: 900;
    letter-spacing: 8px;
    color: #ff4444;
    text-shadow: 0 0 30px #ff4444, 0 0 60px #ff444444;
    margin-bottom: 16px;
  }
  #final-score { font-size: 18px; color: #aaaaaa; margin-bottom: 8px; letter-spacing: 2px; }
  #final-score span { color: #00ffcc; font-size: 28px; }
  #restart-btn {
    margin-top: 40px;
    padding: 16px 48px;
    font-size: 16px;
    letter-spacing: 4px;
    font-family: 'Courier New', monospace;
    background: transparent;
    color: #ff6666;
    border: 2px solid #ff6666;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    box-shadow: 0 0 20px #ff444444;
  }
  #restart-btn:hover {
    background: #ff444422;
    box-shadow: 0 0 40px #ff444488;
    transform: scale(1.04);
  }
  #gameover-overlay.hidden { display: none; }

  #hit-flash {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, #ff000066 100%);
    pointer-events: none;
    z-index: 15;
    opacity: 0;
    transition: opacity 0.1s;
  }
  #hit-flash.active { opacity: 1; }

  #combo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 11;
    color: #ffdd00;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #ffdd00;
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div id="ui">
  <div id="hud">
    <div id="score-block">
      <div id="score-label">SCORE</div>
      <div id="score">0</div>
    </div>
    <div id="level-block">
      <div id="level-label">WAVE</div>
      <div id="level">1</div>
    </div>
    <div id="lives-block">
      <div id="lives-label">LIVES</div>
      <div id="lives">♦ ♦ ♦</div>
    </div>
  </div>
</div>

<div id="health-bar-wrap">
  <div id="health-label">SHIELD</div>
  <div id="health-bar-bg"><div id="health-bar"></div></div>
</div>

<div id="crosshair"></div>

<div id="hit-flash"></div>
<div id="combo"></div>

<div id="overlay">
  <h1>VOID RUNNER</h1>
  <div class="sub">3D SPACE SHOOTER</div>
  <div class="instructions">
    <span>W A S D</span> — Move ship<br>
    <span>MOUSE</span> — Aim<br>
    <span>LEFT CLICK / SPACE</span> — Fire<br>
    <span>SHIFT</span> — Boost
  </div>
  <button id="start-btn" onclick="startGame()">LAUNCH</button>
</div>

<div id="gameover-overlay" class="hidden">
  <h2>DESTROYED</h2>
  <div id="final-score">FINAL SCORE: <span id="final-score-val">0</span></div>
  <button id="restart-btn" onclick="restartGame()">TRY AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GLOBALS ────────────────────────────────────────────────────────────────
let scene, camera, renderer, clock;
let playerShip, playerPivot;
let bullets = [], enemies = [], particles = [], stars = [];
let score = 0, lives = 3, health = 100, wave = 1;
let gameRunning = false;
let keys = {};
let mouse = { x: 0, y: 0 };
let yaw = 0, pitch = 0;
let lastShot = 0, shootCooldown = 180;
let enemySpawnTimer = 0, enemySpawnInterval = 1200;
let waveEnemyCount = 0, waveEnemyMax = 8;
let combo = 0, comboTimer = 0;
let boostCooldown = 0;
let animFrame;

// ─── INIT ────────────────────────────────────────────────────────────────────
function initThree() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000011, 0.008);

  camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 800);
  camera.position.set(0, 1.5, 8);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  clock = new THREE.Clock();

  // Ambient + directional light
  scene.add(new THREE.AmbientLight(0x112233, 0.8));
  const sun = new THREE.DirectionalLight(0x88ccff, 1.2);
  sun.position.set(50, 100, 50);
  sun.castShadow = true;
  scene.add(sun);

  const rim = new THREE.PointLight(0x00ffcc, 2, 60);
  rim.position.set(0, 10, -20);
  scene.add(rim);

  buildStarField();
  buildNebulaPlanes();
  buildPlayer();
  buildArena();
}

// ─── STAR FIELD ─────────────────────────────────────────────────────────────
function buildStarField() {
  const geo = new THREE.BufferGeometry();
  const count = 3000;
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = 300 + Math.random() * 200;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const t = Math.random();
    col[i*3]   = 0.6 + t * 0.4;
    col[i*3+1] = 0.6 + t * 0.4;
    col[i*3+2] = 0.8 + t * 0.2;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({ size: 0.5, vertexColors: true, sizeAttenuation: true });
  scene.add(new THREE.Points(geo, mat));
}

function buildNebulaPlanes() {
  const colors = [0x220044, 0x001133, 0x003322];
  for (let i = 0; i < 3; i++) {
    const geo = new THREE.PlaneGeometry(600, 600);
    const mat = new THREE.MeshBasicMaterial({
      color: colors[i], transparent: true, opacity: 0.12,
      side: THREE.DoubleSide, depthWrite: false
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random() - 0.5) * 100,
      (Math.random() - 0.5) * 100,
      -200 - i * 50
    );
    mesh.rotation.set(Math.random(), Math.random(), Math.random());
    scene.add(mesh);
  }
}

// ─── PLAYER ─────────────────────────────────────────────────────────────────
function buildPlayer() {
  playerPivot = new THREE.Group();
  scene.add(playerPivot);

  playerShip = new THREE.Group();
  playerPivot.add(playerShip);

  // Fuselage
  const bodyGeo = new THREE.CylinderGeometry(0.18, 0.08, 1.8, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x334455, metalness: 0.9, roughness: 0.2 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.x = Math.PI / 2;
  playerShip.add(body);

  // Cockpit
  const cockpitGeo = new THREE.SphereGeometry(0.22, 12, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const cockpitMat = new THREE.MeshStandardMaterial({ color: 0x00ccff, metalness: 0.5, roughness: 0.1, emissive: 0x003344, emissiveIntensity: 0.5 });
  const cockpit = new THREE.Mesh(cockpitGeo, cockpitMat);
  cockpit.position.set(0, 0.1, -0.4);
  cockpit.rotation.x = -Math.PI / 2;
  playerShip.add(cockpit);

  // Wings
  const wingShape = new THREE.Shape();
  wingShape.moveTo(0, 0); wingShape.lineTo(1.4, 0.4); wingShape.lineTo(1.2, -0.3); wingShape.lineTo(0, -0.1); wingShape.closePath();
  const wingGeo = new THREE.ExtrudeGeometry(wingShape, { depth: 0.05, bevelEnabled: false });
  const wingMat = new THREE.MeshStandardMaterial({ color: 0x445566, metalness: 0.8, roughness: 0.3 });
  [-1, 1].forEach(side => {
    const wing = new THREE.Mesh(wingGeo, wingMat);
    wing.position.set(0, 0, 0.2);
    wing.scale.x = side;
    wing.rotation.y = side > 0 ? 0 : Math.PI;
    playerShip.add(wing);
  });

  // Engine glow
  const glowGeo = new THREE.CylinderGeometry(0.12, 0.18, 0.3, 8);
  const glowMat = new THREE.MeshStandardMaterial({ color: 0x00ffcc, emissive: 0x00ffcc, emissiveIntensity: 2, transparent: true, opacity: 0.8 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  glow.position.set(0, 0, 0.9);
  glow.rotation.x = Math.PI / 2;
  glow.name = 'engineGlow';
  playerShip.add(glow);

  const engineLight = new THREE.PointLight(0x00ffcc, 2, 5);
  engineLight.position.set(0, 0, 1.2);
  playerShip.add(engineLight);

  camera.position.set(0, 1.5, 6);
  playerPivot.add(camera);
}

// ─── ARENA ──────────────────────────────────────────────────────────────────
function buildArena() {
  // Floating debris / asteroids in distance
  for (let i = 0; i < 20; i++) {
    spawnDecorAsteroid();
  }
}

function spawnDecorAsteroid() {
  const geo = new THREE.DodecahedronGeometry(1 + Math.random() * 3, 0);
  const mat = new THREE.MeshStandardMaterial({ color: 0x445533, metalness: 0.1, roughness: 0.9 });
  const m = new THREE.Mesh(geo, mat);
  const angle = Math.random() * Math.PI * 2;
  const dist = 80 + Math.random() * 120;
  m.position.set(
    Math.cos(angle) * dist,
    (Math.random() - 0.5) * 60,
    Math.sin(angle) * dist - 60
  );
  m.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
  m.userData.rotSpeed = (Math.random() - 0.5) * 0.005;
  scene.add(m);
  stars.push(m);
}

// ─── ENEMY ──────────────────────────────────────────────────────────────────
function spawnEnemy() {
  const type = Math.random();
  let enemy;

  if (type < 0.5) {
    enemy = buildAsteroid();
  } else if (type < 0.8) {
    enemy = buildFighter();
  } else {
    enemy = buildBomber();
  }

  const angle = Math.random() * Math.PI * 2;
  const radius = 60 + Math.random() * 30;
  enemy.position.set(
    playerPivot.position.x + Math.cos(angle) * radius,
    playerPivot.position.y + (Math.random() - 0.5) * 20,
    playerPivot.position.z - 80 - Math.random() * 40
  );

  enemy.userData.vel = new THREE.Vector3(
    (Math.random() - 0.5) * 0.06,
    (Math.random() - 0.5) * 0.03,
    0.12 + Math.random() * 0.1 + (wave - 1) * 0.02
  );
  enemy.userData.hp = enemy.userData.maxHp;
  enemy.userData.rotVel = new THREE.Vector3(
    (Math.random() - 0.5) * 0.04,
    (Math.random() - 0.5) * 0.04,
    (Math.random() - 0.5) * 0.04
  );
  enemy.userData.shootTimer = Math.random() * 3000;
  enemy.userData.alive = true;

  scene.add(enemy);
  enemies.push(enemy);
  waveEnemyCount++;
}

function buildAsteroid() {
  const geo = new THREE.DodecahedronGeometry(1.5 + Math.random() * 2, 1);
  // Warp vertices slightly for organic look
  const pos = geo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    pos.setXYZ(i,
      pos.getX(i) * (0.8 + Math.random() * 0.4),
      pos.getY(i) * (0.8 + Math.random() * 0.4),
      pos.getZ(i) * (0.8 + Math.random() * 0.4)
    );
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({ color: 0x667755, metalness: 0.1, roughness: 1 });
  const m = new THREE.Mesh(geo, mat);
  m.userData.type = 'asteroid';
  m.userData.maxHp = 2;
  m.userData.score = 100;
  m.castShadow = true;
  return m;
}

function buildFighter() {
  const g = new THREE.Group();
  const bodyGeo = new THREE.ConeGeometry(0.5, 2, 6);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc2222, metalness: 0.8, roughness: 0.3, emissive: 0x330000 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.rotation.x = -Math.PI / 2;
  g.add(body);

  const wingGeo = new THREE.BoxGeometry(3, 0.1, 0.8);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0x992222, metalness: 0.7, roughness: 0.4 });
  const wing = new THREE.Mesh(wingGeo, wingMat);
  wing.position.z = 0.2;
  g.add(wing);

  const eyeGeo = new THREE.SphereGeometry(0.15, 8, 8);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 3 });
  const eye = new THREE.Mesh(eyeGeo, eyeMat);
  eye.position.z = -0.9;
  g.add(eye);

  const light = new THREE.PointLight(0xff2200, 1.5, 6);
  light.position.z = -1;
  g.add(light);

  g.userData.type = 'fighter';
  g.userData.maxHp = 3;
  g.userData.score = 250;
  g.userData.canShoot = true;
  return g;
}

function buildBomber() {
  const g = new THREE.Group();
  const bodyGeo = new THREE.SphereGeometry(1.2, 10, 8);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x884400, metalness: 0.6, roughness: 0.5, emissive: 0x220800 });
  g.add(new THREE.Mesh(bodyGeo, bodyMat));

  const ringGeo = new THREE.TorusGeometry(1.6, 0.15, 8, 20);
  const ringMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff3300, emissiveIntensity: 1 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 3;
  g.add(ring);

  const light = new THREE.PointLight(0xff4400, 2, 8);
  g.add(light);

  g.userData.type = 'bomber';
  g.userData.maxHp = 6;
  g.userData.score = 500;
  g.userData.canShoot = true;
  g.userData.shootInterval = 2000;
  return g;
}

// ─── BULLET ─────────────────────────────────────────────────────────────────
function fireBullet() {
  const now = Date.now();
  if (now - lastShot < shootCooldown) return;
  lastShot = now;

  const geo = new THREE.CylinderGeometry(0.06, 0.06, 0.8, 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 4, transparent: true, opacity: 0.95 });
  const bullet = new THREE.Mesh(geo, mat);
  bullet.rotation.x = Math.PI / 2;

  const dir = new THREE.Vector3(0, 0, -1);
  dir.applyQuaternion(camera.getWorldQuaternion(new THREE.Quaternion()));

  const startPos = new THREE.Vector3();
  camera.getWorldPosition(startPos);
  startPos.addScaledVector(dir, 3);
  bullet.position.copy(startPos);

  const light = new THREE.PointLight(0x00ffff, 3, 6);
  bullet.add(light);

  bullet.userData.vel = dir.clone().multiplyScalar(2.2);
  bullet.userData.life = 120;
  bullet.userData.owner = 'player';
  scene.add(bullet);
  bullets.push(bullet);

  // Muzzle flash
  spawnFlash(startPos, 0x00ffff, 0.5);
}

function fireEnemyBullet(enemy) {
  const geo = new THREE.SphereGeometry(0.2, 6, 6);
  const mat = new THREE.MeshStandardMaterial({ color: 0xff4400, emissive: 0xff2200, emissiveIntensity: 3 });
  const bullet = new THREE.Mesh(geo, mat);

  const playerPos = new THREE.Vector3();
  playerPivot.getWorldPosition(playerPos);

  const dir = playerPos.clone().sub(enemy.position).normalize();
  bullet.position.copy(enemy.position.clone().addScaledVector(dir, 3));
  bullet.userData.vel = dir.multiplyScalar(0.6 + wave * 0.05);
  bullet.userData.life = 150;
  bullet.userData.owner = 'enemy';

  const light = new THREE.PointLight(0xff4400, 2, 5);
  bullet.add(light);
  scene.add(bullet);
  bullets.push(bullet);
}

// ─── PARTICLES ──────────────────────────────────────────────────────────────
function spawnExplosion(pos, color, count = 30, scale = 1) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.SphereGeometry(0.1 + Math.random() * 0.2 * scale, 4, 4);
    const mat = new THREE.MeshStandardMaterial({
      color, emissive: color, emissiveIntensity: 3,
      transparent: true, opacity: 1
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(pos);
    const speed = (0.1 + Math.random() * 0.3) * scale;
    const dir = new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).normalize();
    p.userData.vel = dir.multiplyScalar(speed);
    p.userData.life = 40 + Math.random() * 30;
    p.userData.maxLife = p.userData.life;
    p.userData.type = 'particle';
    scene.add(p);
    particles.push(p);
  }

  // Big flash
  spawnFlash(pos, color, scale * 1.5);
}

function spawnFlash(pos, color, scale = 1) {
  const geo = new THREE.SphereGeometry(scale * 2, 8, 8);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 5,
    transparent: true, opacity: 0.8
  });
  const flash = new THREE.Mesh(geo, mat);
  flash.position.copy(pos);
  flash.userData.life = 8;
  flash.userData.maxLife = 8;
  flash.userData.type = 'flash';
  scene.add(flash);
  particles.push(flash);
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

document.addEventListener('mousemove', e => {
  if (!gameRunning) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch  = Math.max(-0.9, Math.min(0.9, pitch));
});

document.addEventListener('mousedown', e => {
  if (!gameRunning) return;
  if (e.button === 0) fireBullet();
});

document.addEventListener('click', () => {
  if (gameRunning) renderer.domElement.requestPointerLock();
});

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
function gameLoop() {
  animFrame = requestAnimationFrame(gameLoop);
  const dt = clock.getDelta();
  const now = Date.now();

  if (!gameRunning) return;
  renderer.render(scene, camera);

  updatePlayer(dt);
  updateBullets(dt);
  updateEnemies(dt, now);
  updateParticles(dt);
  updateDecor(dt);
  checkCollisions();
  updateSpawner(now);
  updateCombo(dt);
}

// ─── PLAYER UPDATE ──────────────────────────────────────────────────────────
function updatePlayer(dt) {
  // Rotation from mouse
  playerPivot.rotation.y = yaw;
  playerPivot.rotation.x = pitch;

  // Movement
  const speed = (keys['ShiftLeft'] || keys['ShiftRight']) ? 0.35 : 0.18;
  const fwd = new THREE.Vector3(0, 0, -1).applyQuaternion(playerPivot.quaternion);
  const right = new THREE.Vector3(1, 0, 0).applyQuaternion(playerPivot.quaternion);
  const up = new THREE.Vector3(0, 1, 0);

  if (keys['KeyW'] || keys['ArrowUp'])    playerPivot.position.addScaledVector(fwd, speed);
  if (keys['KeyS'] || keys['ArrowDown'])  playerPivot.position.addScaledVector(fwd, -speed * 0.6);
  if (keys['KeyA'] || keys['ArrowLeft'])  playerPivot.position.addScaledVector(right, -speed);
  if (keys['KeyD'] || keys['ArrowRight']) playerPivot.position.addScaledVector(right, speed);
  if (keys['KeyQ']) playerPivot.position.addScaledVector(up, speed * 0.6);
  if (keys['KeyE']) playerPivot.position.addScaledVector(up, -speed * 0.6);

  // Auto-forward movement
  playerPivot.position.addScaledVector(fwd, 0.08);

  // Keep in bounds (soft)
  const p = playerPivot.position;
  p.x = Math.max(-80, Math.min(80, p.x));
  p.y = Math.max(-40, Math.min(40, p.y));

  // Ship visual tilt
  const tiltX = (keys['KeyA']||keys['ArrowLeft']) ? 0.4 : (keys['KeyD']||keys['ArrowRight']) ? -0.4 : 0;
  const tiltZ = (keys['KeyW']||keys['ArrowUp']) ? -0.15 : 0;
  playerShip.rotation.z += (tiltX - playerShip.rotation.z) * 0.1;
  playerShip.rotation.x += (tiltZ - playerShip.rotation.x) * 0.1;

  // Engine glow pulse
  const glow = playerShip.getObjectByName('engineGlow');
  if (glow) {
    const boost = keys['ShiftLeft'] || keys['ShiftRight'];
    glow.material.emissiveIntensity = boost ? 4 + Math.sin(Date.now() * 0.05) : 1.5 + Math.sin(Date.now() * 0.02) * 0.5;
    glow.scale.z = boost ? 1.5 + Math.random() * 0.5 : 1;
  }

  // Shoot on space
  if (keys['Space']) fireBullet();
}

// ─── BULLET UPDATE ───────────────────────────────────────────────────────────
function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.position.add(b.userData.vel);
    b.userData.life--;
    if (b.userData.life <= 0) {
      scene.remove(b);
      bullets.splice(i, 1);
    }
  }
}

// ─── ENEMY UPDATE ────────────────────────────────────────────────────────────
function updateEnemies(dt, now) {
  const playerPos = new THREE.Vector3();
  playerPivot.getWorldPosition(playerPos);

  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.userData.alive) { scene.remove(e); enemies.splice(i, 1); continue; }

    // Move toward player (homing for fighters)
    if (e.userData.type === 'fighter' || e.userData.type === 'bomber') {
      const toPlayer = playerPos.clone().sub(e.position).normalize();
      e.userData.vel.lerp(toPlayer.multiplyScalar(e.userData.vel.length()), 0.02);
    }

    e.position.add(e.userData.vel);
    e.rotation.x += e.userData.rotVel.x;
    e.rotation.y += e.userData.rotVel.y;

    // Shoot at player
    if (e.userData.canShoot) {
      e.userData.shootTimer -= dt * 1000;
      const interval = e.userData.shootInterval || 3000 - (wave * 200);
      if (e.userData.shootTimer <= 0) {
        e.userData.shootTimer = Math.max(600, interval) + Math.random() * 500;
        if (e.position.distanceTo(playerPos) < 100) {
          fireEnemyBullet(e);
        }
      }
    }

    // Cull far enemies
    if (e.position.distanceTo(playerPos) > 180) {
      scene.remove(e); enemies.splice(i, 1);
    }
  }
}

// ─── PARTICLES UPDATE ────────────────────────────────────────────────────────
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (p.userData.vel) p.position.add(p.userData.vel);
    p.userData.life--;
    const t = p.userData.life / p.userData.maxLife;
    if (p.material) p.material.opacity = t;
    if (p.userData.type === 'flash') p.scale.setScalar(1 + (1 - t) * 2);
    if (p.userData.type === 'particle') p.userData.vel.multiplyScalar(0.95);
    if (p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
  }
}

// ─── DECOR UPDATE ────────────────────────────────────────────────────────────
function updateDecor(dt) {
  for (const s of stars) {
    s.rotation.y += s.userData.rotSpeed;
  }
}

// ─── COLLISION ───────────────────────────────────────────────────────────────
function checkCollisions() {
  const playerPos = new THREE.Vector3();
  playerPivot.getWorldPosition(playerPos);

  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];

    if (b.userData.owner === 'player') {
      // vs enemies
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        if (!e.userData.alive) continue;
        const size = e.userData.type === 'asteroid' ? 2.5 : e.userData.type === 'bomber' ? 2 : 1.2;
        if (b.position.distanceTo(e.position) < size) {
          e.userData.hp--;
          spawnFlash(b.position, 0xffaa00, 0.4);
          scene.remove(b); bullets.splice(bi, 1);
          if (e.userData.hp <= 0) {
            killEnemy(e, ei);
          }
          break;
        }
      }
    } else {
      // enemy bullet vs player
      if (b.position.distanceTo(playerPos) < 2) {
        takeDamage(15);
        spawnExplosion(playerPos, 0xff4400, 15, 0.5);
        scene.remove(b); bullets.splice(bi, 1);
      }
    }
  }

  // Enemy collision with player
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.userData.alive) continue;
    if (e.position.distanceTo(playerPos) < 3) {
      takeDamage(25);
      killEnemy(e, i);
    }
  }
}

function killEnemy(e, idx) {
  const color = e.userData.type === 'asteroid' ? 0xaa7733 : 0xff4400;
  const cnt   = e.userData.type === 'bomber'   ? 50 : 25;
  spawnExplosion(e.position, color, cnt, e.userData.type === 'bomber' ? 1.8 : 1);
  e.userData.alive = false;

  // Score + combo
  combo++;
  comboTimer = 180;
  const multiplier = Math.min(combo, 8);
  const gained = e.userData.score * multiplier;
  score += gained;
  updateHUD();

  if (combo >= 3) showCombo(combo, multiplier);
}

function takeDamage(amount) {
  health = Math.max(0, health - amount);
  document.getElementById('health-bar').style.width = health + '%';
  const bar = document.getElementById('health-bar');
  bar.style.background = health > 50
    ? 'linear-gradient(90deg, #00ffcc, #00ff88)'
    : health > 25
      ? 'linear-gradient(90deg, #ffcc00, #ff8800)'
      : 'linear-gradient(90deg, #ff4444, #ff0000)';

  // Hit flash
  const flash = document.getElementById('hit-flash');
  flash.classList.add('active');
  setTimeout(() => flash.classList.remove('active'), 150);

  if (health <= 0) {
    lives--;
    updateHUD();
    if (lives <= 0) {
      triggerGameOver();
    } else {
      health = 100;
      document.getElementById('health-bar').style.width = '100%';
    }
  }
}

// ─── SPAWNER ─────────────────────────────────────────────────────────────────
function updateSpawner(now) {
  if (now - enemySpawnTimer > enemySpawnInterval) {
    enemySpawnTimer = now;
    spawnEnemy();
    if (waveEnemyCount >= waveEnemyMax) {
      advanceWave();
    }
  }
}

function advanceWave() {
  wave++;
  waveEnemyCount = 0;
  waveEnemyMax = 8 + wave * 3;
  enemySpawnInterval = Math.max(400, 1200 - wave * 80);
  updateHUD();
  showWaveMessage();
}

function showWaveMessage() {
  const el = document.getElementById('combo');
  el.textContent = `WAVE ${wave}`;
  el.style.color = '#00ffcc';
  el.style.textShadow = '0 0 20px #00ffcc';
  el.style.opacity = '1';
  el.style.fontSize = '40px';
  setTimeout(() => { el.style.opacity = '0'; }, 2000);
}

// ─── COMBO ───────────────────────────────────────────────────────────────────
function updateCombo(dt) {
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer <= 0) combo = 0;
  }
}

function showCombo(n, mult) {
  const el = document.getElementById('combo');
  el.textContent = `${n}x COMBO ×${mult}`;
  el.style.color = '#ffdd00';
  el.style.textShadow = '0 0 20px #ffdd00';
  el.style.opacity = '1';
  el.style.fontSize = '28px';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 1200);
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('level').textContent = wave;
  const livesEl = document.getElementById('lives');
  livesEl.textContent = '♦ '.repeat(Math.max(0, lives)).trim() || '—';
}

// ─── GAME CONTROL ────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  initThree();
  resetState();
  gameRunning = true;
  renderer.domElement.requestPointerLock();
  clock.start();
  gameLoop();
}

function restartGame() {
  document.getElementById('gameover-overlay').classList.add('hidden');

  // Clear scene
  if (scene) {
    while (scene.children.length > 0) scene.remove(scene.children[0]);
  }
  bullets = []; enemies = []; particles = []; stars = [];
  cancelAnimationFrame(animFrame);

  document.exitPointerLock();
  initThree();
  resetState();
  gameRunning = true;
  renderer.domElement.requestPointerLock();
  clock.start();
  gameLoop();
}

function resetState() {
  score = 0; lives = 3; health = 100; wave = 1;
  combo = 0; comboTimer = 0;
  yaw = 0; pitch = 0;
  lastShot = 0;
  enemySpawnTimer = Date.now();
  waveEnemyCount = 0;
  waveEnemyMax = 8;
  enemySpawnInterval = 1200;
  updateHUD();
  document.getElementById('health-bar').style.width = '100%';
  document.getElementById('health-bar').style.background = 'linear-gradient(90deg, #00ffcc, #00ff88)';
  document.getElementById('combo').style.opacity = '0';
}

function triggerGameOver() {
  gameRunning = false;
  document.getElementById('final-score-val').textContent = score.toLocaleString();
  document.getElementById('gameover-overlay').classList.remove('hidden');
  document.exitPointerLock();
}
</script>
